<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Signup - Offline Ready</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* Base Reset */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #18783080, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 90%;
            max-width: 420px;
        }

        .auth-header {
            text-align: center;
            padding: 1.5rem;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .form-container { padding: 2rem; }

        .mb-3 { margin-bottom: 1rem; }
        .form-label { 
            display: block; 
            margin-bottom: .5rem; 
            font-size: 0.9rem; 
            color: #444;
        }
        .form-control {
            display: block;
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 1px solid #ced4da;
            border-radius: 8px;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #6c63ff;
        }

        .btn {
            cursor: pointer;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: 0.3s;
        }
        .btn-primary {
            background: #6c63ff;
            color: white;
        }
        .btn-primary:hover { background: #5848d6; }

        .toggle-link {
            cursor: pointer;
            color: #6c63ff;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .toggle-link:hover { text-decoration: underline; }

        .text-center { text-align: center; }
        .mt-3 { margin-top: 1rem; }
        .d-flex { display: flex; }
        .justify-content-between { justify-content: space-between; }
        .align-items-center { align-items: center; }

        .hidden { display: none; }
        
        .form-check { display: flex; align-items: center; gap: 8px; }
        .form-check-input { cursor: pointer; width: 18px; height: 18px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <h3 id="formTitle" style="margin:0;">Login</h3>
    </div>

    <div class="form-container">

        <form id="loginForm" onsubmit="login(event)">
            <div class="mb-3">
                <label class="form-label">Account Name</label>
                <input id="login_account_name" name="account_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="login_password" name="password" class="form-control" required>
            </div>

            <div class="mb-3 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                    <label class="form-label" for="remember" style="margin:0;">Remember me</label>
                </div>
                <a href="#" class="toggle-link" onclick="forgotCheck()">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>

            <p class="text-center mt-3" style="font-size: 0.9rem;">
                Don’t have an account? 
                <span class="toggle-link" onclick="toggleForms()">Sign up</span>
            </p>
        </form>

        <form id="signupForm" onsubmit="signup(event)" class="hidden">
            <div class="mb-3">
                <label class="form-label">Account Name</label>
                <input id="signup_account_name" name="account_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="signup_email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="signup_password" name="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="signup_confirmPassword" class="form-control" required>
            </div>

            <div class="mb-3 form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-label" for="terms" style="margin:0;">
                    I agree to the Terms & Conditions
                    <a href="#" class="toggle-link">read more...</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>

            <p class="text-center mt-3" style="font-size: 0.9rem;">
                Already have an account? 
                <span class="toggle-link" onclick="toggleForms()">Login</span>
            </p>
        </form>

    </div>
</div>

<script>
    // SHA-256 Hashing Function
    async function upHash(message) {
        const msgUint8 = new TextEncoder().encode(message);                           
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);           
        const hashArray = Array.from(new Uint8Array(hashBuffer));                     
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join(''); 
    }

    function toggleForms() {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const title = document.getElementById('formTitle');

        loginForm.classList.toggle('hidden');
        signupForm.classList.toggle('hidden');
        title.textContent = loginForm.classList.contains('hidden') ? 'Sign Up' : 'Login';
    }

    async function forgotCheck() {
        const username = document.getElementById("login_account_name").value;
        if(!username) {
            alert('Please fill Account Name section and try again');
            return;
        }

        const response = await fetch('https://mtmmnfw.netlify.app/api/passreset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user: username })
        });
        
        if (response.ok) {
            const targetPath=await response.text();
            alert('Please check your email for the Password reset link...');
        } else {
            alert('Error processing reset request');
        }
    }

    async function login(event) {
        event.preventDefault();
        
        const username = document.getElementById("login_account_name").value;
        const passwordVal = document.getElementById("login_password").value;
        
        const hashed = await upHash(passwordVal);
        
        const jsonbuilder = {
            account_name: username,
            password: hashed
        };

        const response = await fetch("https://mtmmnfw.netlify.app/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(jsonbuilder)
        });
        
        if (response.ok) {
            const targetPath = await response.text();
            alert('Login successful! Redirecting for OTP...');
            window.location.href = `/api/otp/${targetPath}`;
        } else {
            alert('Invalid Account or Password');
        }
    }
    
    async function signup(event) {
        event.preventDefault();
        
        const username = document.getElementById("signup_account_name").value;
        const email = document.getElementById("signup_email").value;
        const password = document.getElementById("signup_password").value;
        const confirmPassword = document.getElementById("signup_confirmPassword").value;

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }
        
        const hashed = await upHash(password);
        
        const jsonbuilder = {
            account_name: username,
            email: email,
            password: hashed
        };
        
        const response = await fetch("https://mtmmnfw.netlify.app/api/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(jsonbuilder)
        });

        if(response.ok) {
            alert("Account created! Please login.");
            toggleForms();
        } else {
            alert("Signup failed.");
        }
    }
</script>

</body>
</html>
