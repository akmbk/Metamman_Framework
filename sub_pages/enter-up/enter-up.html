<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Signup - Offline Ready</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* Base Reset to replace Bootstrap Offline */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #18783080, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container & Card */
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 90%;
            max-width: 420px;
        }

        .auth-header {
            text-align: center;
            padding: 1.5rem;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .form-container { padding: 2rem; }

        /* Form Elements */
        .mb-3 { margin-bottom: 1rem; }
        .form-label { 
            display: block; 
            margin-bottom: .5rem; 
            font-size: 0.9rem; 
            color: #444;
        }
        .form-control {
            display: block;
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 1px solid #ced4da;
            border-radius: 8px;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #6c63ff;
        }

        /* Buttons & Links */
        .btn {
            cursor: pointer;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: 0.3s;
        }
        .btn-primary {
            background: #6c63ff;
            color: white;
        }
        .btn-primary:hover { background: #5848d6; }

        .toggle-link {
            cursor: pointer;
            color: #6c63ff;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .toggle-link:hover { text-decoration: underline; }

        .text-center { text-align: center; }
        .mt-3 { margin-top: 1rem; }
        .d-flex { display: flex; }
        .justify-content-between { justify-content: space-between; }
        .align-items-center { align-items: center; }

        .hidden { display: none; }
        
        .form-check { display: flex; align-items: center; gap: 8px; }
        .form-check-input { cursor: pointer; width: 18px; height: 18px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <h3 id="formTitle" style="margin:0;">Login</h3>
    </div>

    <div class="form-container">

        <form id="loginForm" action="https://mtmmnfw.netlify.app/login" method="post">
            <div class="mb-3">
                <label class="form-label">Account Name</label>
                <input name="accname" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control">
            </div>

            <div class="mb-3 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                    <label class="form-label" for="remember" style="margin:0;">Remember me</label>
                </div>
                <a href="#" class="toggle-link" onclick="forgotCheck()">Forgot password?</a>
            </div>

            <button type="loginup" class="btn btn-primary">Login</button>

            <p class="text-center mt-3" style="font-size: 0.9rem;">
                Don’t have an account? 
                <span class="toggle-link" onclick="toggleForms()">Sign up</span>
            </p>
        </form>

        <form id="signupForm" class="hidden" action="https://mtmmnfw.netlify.app/api/signup/" method="post">
            <div class="mb-3">
                <label class="form-label">Account Name</label>
                <input type="text" name="account_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" required>
            </div>

            <div class="mb-3 form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-label" for="terms" style="margin:0;">
                    I agree to the Terms & Conditions
                </label>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>

            <p class="text-center mt-3" style="font-size: 0.9rem;">
                Already have an account? 
                <span class="toggle-link" onclick="toggleForms()">Login</span>
            </p>
        </form>

    </div>
</div>

<script>
	
	async function forgotCheck() {
		const form=document.forms["loginForm"];
		const input=form.elements["accname"];
		const val=input.value.trim();
		if(val==="") {
			alert('Please fill Account Name section, and Try Again');
		} else {
			const data={user: val};
			const response = await fetch('https://mtmmnfw.netlify.app/passreset/', {
				method: 'POST',
				body: JSON.stringify(data)
			});
			
		}
	}
	
	function toggleForms() {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const title = document.getElementById('formTitle');

        loginForm.classList.toggle('hidden');
        signupForm.classList.toggle('hidden');

        title.textContent = loginForm.classList.contains('hidden') ? 'Sign Up' : 'Login';
    }
	
	window.toggleForms=toggleForms;
	
	function upHash(message) {
		// 1. String to Bytes (The 'Sutham' Encoding)
		const msgUint8 = new TextEncoder().encode(message);                           
		
		// 2. The ALU Operation (SHA-256)
		const hashBuffer = crypto.subtle.digest('SHA-256', msgUint8);           
	
		// 3. Buffer to Hex String (The Pointer Representation)
		const hashArray = Array.from(new Uint8Array(hashBuffer));                     
		const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join(''); 
		
		return hashHex;
	}

	const loginForm = document.getElementById('loginForm');
	
	loginForm.addEventListener('loginup', async (e) => {
		e.preventDefault(); // Stop the 'page wipe' interrupt
		
		login.password.value=upHash(login.password.value);
		
		// 1. Package the bits (Email, Pass, etc.)
		const formData = new FormData(loginForm);
		
		// 2. Transmit to your /login route (handled by your Netlify/Render bridge)
		const response = await fetch('https://mtmmnfw.netlify.app/login/', {
			method: 'POST',
			body: new URLSearchParams(formData)
		});
	
		// 3. The Listener waits here (The 'Wait/Resume' state)
		const data = await response.json();
	
		// 4. Act on the sessionID
		if (data.sessionID) {
			// Now you can redirect or update your UI lazily
			window.location.href = `/otp/${data.sessionID}`;
		}
	});
	
    // Password match validation
    document.getElementById("signupForm").addEventListener("submit", function (e) {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
            e.preventDefault();
            alert("Passwords do not match!");
        }
		
		const hashed=upHash(password.value);
		password.value=hashed;
		confirmPassword.value=hashed;
		form.submit();
		
    });
	
	
</script>

</body>
</html>
